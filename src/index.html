  <body class="font-sans antialiased overflow-hidden">
    <div class="relative h-screen overflow-hidden" style="font-size: min(max(16px, calc(0.4vw + 0.4vh)), 2.8vmin, 1.8vh, 32px);">
      <div class="relative mx-auto w-full h-full city overflow-hidden">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 sun"></div>
      </div>

      <div class="player">
        <div id="disc" class="sun"></div>
        <div class="player-content">
          <div class="text-center info-text info info-shadow">
            <div id="song-text" class="tracking-wide leading-tight truncate">TjenaMors Radio</div>
            <span id="artist"
              class="block tracking-wider truncate">Vi spelar bra skit!</span>
          </div>
          <div class="volume-control">
            <i class="fa-solid fa-volume-high" id="volume-icon" role="button" tabindex="0"></i>
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1">
          </div>
          <div class="controls">
            <div class="controls-left">
              <button id="play-pause" class="btn" disabled><i class="fa-solid fa-play"></i></button>
              <button id="live-btn" class="btn live">LIVE</button>
            </div>
            <i class="fa-solid fa-share-from-square" id="share-btn" role="button" tabindex="0" title="Dela"></i>
          </div>
          <div class="timeline-row">
              <div class="timeline-wrap">
                <div class="progress"><div id="progress-fill"></div></div>
              </div>
              <div id="time" class="tracking-widest"></div>
            </div>
          <div class="request-wrap mt-4 mx-auto">
            <button id="request-btn" class="btn w-full" disabled>Önska låt</button>
          </div>
        </div>
      </div>

      <div class="grid-container">
        <div class="synth-grid"></div>
      </div>

      <div id="surf-tip" aria-live="polite">
        <a id="surf-tip-link" href="#" target="_blank" rel="noopener">
          <span id="surf-tip-text"></span>
        </a>
      </div>

      <div id="cookie-notice">
        <i class="fa-solid fa-xmark" id="cookie-dismiss"></i>
        🍪 Vi sparar volymen i en cookie. Vi rövknullar bara folk som vill och förtjänar att bli det.🤘
      </div>

      <div id="bottom-left-links">
        <a id="internet-radio-badge" href="http://www.internet-radio.com" target="_blank" rel="noopener" title="Internet Radio">
          <img src="https://www.internet-radio.com/images/internet-radio-badge.gif" alt="Internet Radio" width="78" height="15" />
        </a>
      </div>

      <div id="request-modal" class="fixed inset-0 z-50 flex flex-col items-center justify-start pt-safe pb-safe px-4">
        <div class="request-modal-bg absolute inset-0"></div>
        <div class="request-modal-content relative w-full max-w-2xl flex flex-col mt-8">
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-2xl font-audiowide text-pink-400 text-shadow-neon">Önska låt</h2>
            <button id="request-close" class="text-2xl text-cyan-400 hover:text-pink-400 transition-colors"><i class="fa-solid fa-xmark"></i></button>
          </div>
          <input type="text" id="request-search" placeholder="Sök låt eller artist..." class="w-full p-3 mb-4 bg-dark-glass border-2 border-cyan-400 rounded text-white font-sans focus:border-pink-400 focus:outline-none transition-colors" />
          <div id="request-list" class="flex-1 overflow-y-auto flex flex-col gap-2 pr-2">
            <!-- Request items will be injected here -->
          </div>
          <div class="flex justify-between items-center mt-4 pt-4 border-t border-cyan-400/30">
            <button id="request-prev" class="btn" disabled><i class="fa-solid fa-chevron-left"></i></button>
            <span id="request-page-info" class="font-audiowide text-sm text-cyan-200">Sida 1</span>
            <button id="request-next" class="btn" disabled><i class="fa-solid fa-chevron-right"></i></button>
          </div>
          <div id="request-feedback" class="absolute inset-0 flex items-center justify-center bg-dark-glass backdrop-blur-md hidden flex-col gap-4 text-center p-6 rounded-lg border-2 border-pink-400">
            <div class="text-xl font-audiowide text-cyan-400" id="request-feedback-text">Skickar önskan...</div>
          </div>
        </div>
      </div>

      <div id="request-toast">
        <span id="request-toast-text"></span>
        <button id="request-toast-cancel">Avbryt</button>
      </div>
    </div>

    <audio id="radio" preload="metadata" autoplay playsinline muted></audio>
    <script src="build/assets/hls.min.js"></script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
